<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme') === 'dark' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e9eef6">
  <meta name="description" content="Bolão da Copa do Mundo 2026 entre amigos — aposte nos placares, acompanhe ao vivo e dispute o ranking.">
  <title>Futebolão · Copa 2026</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/views.css">
</head>
<body>
  <div id="bg-glow" aria-hidden="true"></div>
  <div id="app">
    <div class="boot-splash">
      <div class="boot-ball" aria-hidden="true"></div>
      <p>Carregando o Futebolão…</p>
    </div>
  </div>
  <div id="toasts" aria-live="polite"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
