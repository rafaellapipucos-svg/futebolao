[pytest]
testpaths = tests
addopts = -q
# Teto de seguranca: nenhum teste deve levar mais que isso. Sem isto, um
# teste que trava (ex.: stream infinito nao fechado corretamente) faz o
# `pytest` - e o build do Docker - ficar pendurado para sempre, sem falhar.
timeout = 60
filterwarnings =
    error::DeprecationWarning:app.*
