# Suite de integracao contra POSTGRES REAL em um comando:
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from pgtests
services:
  pgdb:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bolao_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bolao_test"]
      interval: 2s
      timeout: 3s
      retries: 20

  pgtests:
    build:
      context: .
      target: devbase
    depends_on:
      pgdb:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: postgresql://postgres:postgres@pgdb:5432/bolao_test
    command: python -m pytest tests/pg -q -rs
